<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Session Timer</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <div id="status-bar">
      <span class="dot" id="connection-dot"></span>
      <span id="status-text">STOPPED</span>
    </div>

    <div id="analog-clock"></div>

    <div class="main-display">
      <div id="digital-clock">00:00:00<span class="tenths">.0</span></div>
    </div>

    <div class="corner-footer">
      <div id="speed-display">
        <span id="speed-label">Speed</span>
        <span id="speed-value">1.00x</span>
      </div>

      <div id="real-time">
        <span id="real-time-label">Real time</span>
        <span id="real-time-value">00:00:00</span>
      </div>
    </div>
  </div>

  <script type="module" src="/js/viewer.js"></script>
</body>
</html>
